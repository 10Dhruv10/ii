<!DOCTYPE html>
<html>
<head>
  <title>My Mobile Site</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-mobile/1.4.5/jquery.mobile.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-mobile/1.4.5/jquery.mobile.min.js"></script>
</head>
<body>

<!-- PAGE 1: HOME -->
<div data-role="page" id="home">

  <div data-role="header">
    <h1>Home</h1>
  </div>

  <div data-role="content">
    <h2>Welcome!</h2>
    <p>This is a simple jQuery Mobile website.</p>

    <a href="#about" data-role="button">Go to About</a>
    <a href="#contact" data-role="button">Go to Contact</a>
  </div>

  <div data-role="footer">
    <h4>My Mobile Site</h4>
  </div>

</div>


<!-- PAGE 2: ABOUT -->
<div data-role="page" id="about">

  <div data-role="header">
    <a href="#home" data-role="button" data-icon="back">Back</a>
    <h1>About</h1>
  </div>

  <div data-role="content">
    <h2>About Us</h2>
    <p>This website was built using jQuery Mobile.</p>

    <ul data-role="listview">
      <li>Easy to use</li>
      <li>Mobile friendly</li>
      <li>Touch optimized</li>
    </ul>
  </div>

  <div data-role="footer">
    <h4>My Mobile Site</h4>
  </div>

</div>




<script>
  $("#submitBtn").click(function() {
    var name = $("#name").val();
    if (name == "") {
      $("#result").text("Please enter your name.");
    } else {
      $("#result").text("Thank you, " + name + "! We will be in touch.");
    }
  });
</script>

</body>
</html>
