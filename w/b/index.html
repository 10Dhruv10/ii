<!DOCTYPE html>
<html>
<head>
    <title>College Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar bg-dark text-white">

            <h3 class="text-center mt-3">Dashboard</h3>

            <ul class="nav flex-column mt-4">
                <li class="nav-item">
                    <a href="#" class="nav-link text-white">Home</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link text-white">Students</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link text-white">Courses</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link text-white">Exams</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link text-white">Results</a>
                </li>
            </ul>

        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <h2>College Admin Dashboard</h2>

            <!-- Cards -->
            <div class="row mt-4">

                <div class="col-md-3">
                    <div class="card bg-primary text-white p-3">
                        <h5> Total Students</h5>
                        <h2>1500</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card bg-success text-white p-3">
                        <h5>Total Courses</h5>
                        <h2>35</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card bg-warning text-dark p-3">
                        <h5>Exams</h5>
                        <h2>20</h2>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card bg-danger text-white p-3">
                        <h5>Pending Results</h5>
                        <h2>8</h2>
                    </div>
                </div>

            </div>

            <!-- Table -->
            <div class="mt-5">

                <h4>Recent Exam Details</h4>

                <table class="table table-bordered table-striped mt-3">

                    <tr class="table-dark">
                        <th>Subject</th>
                        <th>Department</th>
                        <th>Date</th>
                    </tr>

                    <tr>
                        <td>DBMS</td>
                        <td>IT</td>
                        <td>20 May 2026</td>
                    </tr>

                    <tr>
                        <td>CN</td>
                        <td>CS</td>
                        <td>24 May 2026</td>
                    </tr>

                    <tr>
                        <td>Cloud Computing</td>
                        <td>ENTC</td>
                        <td>28 May 2026</td>
                    </tr>

                </table>

            </div>

        </div>

    </div>
</div>

<!-- External JS -->
<script src="script.js"></script>

</body>
</html>
